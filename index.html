<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kurir - Siapa Cepat</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { width: 100%; height: 50vh; }
        .panel { padding: 20px; }
        .order-card { background: #fff3cd; padding: 15px; border-radius: 10px; border: 1px solid #ffeeba; display: none; }
        .btn-ambil { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <div id="statusGPS">GPS Menghubungkan...</div>
        <div class="order-card" id="orderNotif">
            <div id="orderText">Ada pesanan jastip baru!</div>
            <button class="btn-ambil" onclick="ambilPesanan()">AMBIL PESANAN (REBUTAN)</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = { /* Masukkan Config Firebase Bima */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const kurirId = "kurir_" + Math.floor(Math.random() * 1000); // ID Unik kurir

        let map, markerKurir, markerUser;
        const blueIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [25, 41] });
        const greenIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41] });

        function init() {
            map = L.map('map').setView([0,0], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markerKurir = L.marker([0,0], {icon: blueIcon}).addTo(map);
            markerUser = L.marker([0,0], {icon: greenIcon}).addTo(map);

            // Update Lokasi Online (Standby)
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                markerKurir.setLatLng([lat, lng]);
                map.setView([lat, lng], 15);
                db.ref('kurir_online/' + kurirId).set({ lat, lng });
                document.getElementById('statusGPS').innerHTML = "Status: <b>Online & Standby</b>";
            });

            // Pantau Rebutan Pesanan
            db.ref('pesanan/aktif').on('value', snap => {
                const order = snap.val();
                if(order && order.status === 'mencari') {
                    document.getElementById('orderNotif').style.display = "block";
                    document.getElementById('orderText').innerHTML = "Pesanan dari: <b>" + order.toko + "</b>";
                } else if (order && order.status === 'diambil' && order.kurirId === kurirId) {
                    // Jika kurir ini yang menang rebutan
                    document.getElementById('orderNotif').style.display = "none";
                    document.getElementById('statusGPS').innerHTML = "<b>Pesanan Sedang Diantar!</b>";
                    markerUser.setLatLng([order.userLat, order.userLng]); // Posisi user baru terlihat sekarang
                    map.fitBounds(new L.featureGroup([markerKurir, markerUser]).getBounds());
                } else {
                    document.getElementById('orderNotif').style.display = "none";
                    markerUser.setLatLng([0,0]); // Sembunyikan user jika standby
                }
            });
        }

        function ambilPesanan() {
            // Logika Siapa Cepat Dia Dapat menggunakan transaction agar tidak bentrok
            db.ref('pesanan/aktif').transaction((currentData) => {
                if (currentData && currentData.status === 'mencari') {
                    currentData.status = 'diambil';
                    currentData.kurirId = kurirId;
                    currentData.kurirName = "Kurir Bima";
                    return currentData;
                }
                return; // Batalkan jika sudah diambil orang lain
            }, (error, committed) => {
                if (committed) alert("Anda berhasil mengambil pesanan!");
                else alert("Maaf, pesanan sudah diambil kurir lain.");
            });
        }
        init();
    </script>
</body>
</html>
