<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kurir - Rebutan Order</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; }
        #map { width: 100%; height: 60vh; background: #333; }
        .panel { padding: 15px; }
        .order-card { background: #333; border: 2px solid #007bff; padding: 20px; border-radius: 15px; display: none; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-ambil { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #infoRute { background: #007bff; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; font-weight: bold; text-align: center; }
        #statusGPS { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <div id="statusGPS">Menghubungkan GPS...</div>
        <div id="infoRute"></div>
        
        <div class="order-card" id="orderNotif">
            <h3 style="margin-top:0">📦 Pesanan Baru Tersedia!</h3>
            <p id="orderDetail"></p>
            <button class="btn-ambil" onclick="ambilPesanan()">AMBIL SEKARANG (REBUTAN)</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCSwZqJAUvacT-oMJCtgp9tfCfCqxOM9CU",
            authDomain: "jastiptrackingbima.firebaseapp.com",
            databaseURL: "https://jastiptrackingbima-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "jastiptrackingbima",
            storageBucket: "jastiptrackingbima.firebasestorage.app",
            messagingSenderId: "187742172528",
            appId: "1:187742172528:web:0556ec9c738476faff0bb5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let kurirId = localStorage.getItem('kurir_id_bima') || "Kurir_" + Math.floor(Math.random() * 1000);
        localStorage.setItem('kurir_id_bima', kurirId);

        let map, markerKurir, markerUser, routingControl;
        const blueIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        const greenIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });

        // Inisialisasi Peta
        map = L.map('map').setView([-0.4781, 117.1518], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markerKurir = L.marker([0,0], {icon: blueIcon}).addTo(map).bindPopup("Posisi Anda");
        markerUser = L.marker([0,0], {icon: greenIcon});

        // Tracking Lokasi Kurir
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                markerKurir.setLatLng([lat, lng]);
                
                // Update ke Firebase agar User bisa melihat kurir
                const onlineRef = db.ref('kurir_online/' + kurirId);
                onlineRef.set({ lat, lng, nama: kurirId, online: true });
                onlineRef.onDisconnect().remove();

                document.getElementById('statusGPS').innerHTML = "GPS Aktif: " + lat.toFixed(4) + ", " + lng.toFixed(4);
            }, null, { enableHighAccuracy: true });
        }

        // Pantau Orderan Masuk
        db.ref('pesanan/aktif').on('value', snap => {
            const order = snap.val();
            const notif = document.getElementById('orderNotif');
            const info = document.getElementById('infoRute');

            if (order && order.status === 'mencari') {
                notif.style.display = "block";
                document.getElementById('orderDetail').innerText = "Lokasi: " + order.toko;
                if(routingControl) map.removeControl(routingControl);
            } 
            else if (order && order.status === 'diambil' && order.kurirId === kurirId) {
                // Jika pesanan ini diambil oleh saya
                notif.style.display = "none";
                info.style.display = "block";
                markerUser.setLatLng([order.userLat, order.userLng]).addTo(map).bindPopup("Lokasi User");
                updateRute(order.userLat, order.userLng);
            } 
            else {
                notif.style.display = "none";
                if(order && order.status === 'diambil') info.style.display = "none";
            }
        });

        function updateRute(uLat, uLng) {
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [markerKurir.getLatLng(), L.latLng(uLat, uLng)],
                lineOptions: { styles: [{ color: '#007bff', weight: 6 }] },
                createMarker: () => null
            }).on('routesfound', e => {
                const r = e.routes[0];
                const text = `Menuju User: ${(r.summary.totalDistance/1000).toFixed(1)}km (${Math.round(r.summary.totalTime/60)} mnt)`;
                document.getElementById('infoRute').innerText = text;
                db.ref('pesanan/aktif/estimasi').set(text);
            }).addTo(map);
        }

        function ambilPesanan() {
            db.ref('pesanan/aktif').transaction(cur => {
                if (cur && cur.status === 'mencari') {
                    cur.status = 'diambil';
                    cur.kurirId = kurirId;
                    return cur;
                }
                return; // Jika sudah diambil orang lain, batalkan
            }, (error, committed) => {
                if (!committed) alert("Maaf! Orderan sudah diambil kurir lain.");
            });
        }
    </script>
</body>
</html>
